<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实时空: 电影级光影地月系统</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        #canvas-container { width: 100%; height: 100vh; display: block; }
        
        #ui-overlay { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 3px rgba(0,0,0,1); }
        #status-message { font-size: 1.1em; background: rgba(0, 0, 0, 0.5); border-left: 4px solid #4CAF50; padding: 10px 15px; border-radius: 4px; display: inline-block; margin-bottom: 10px; backdrop-filter: blur(4px); }

        #moon-inset-container { position: absolute; bottom: 20px; right: 20px; background: rgba(10, 15, 30, 0.7); padding: 15px 25px; border-radius: 12px; text-align: center; color: white; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #moon-inset-container h3 { margin: 0 0 10px 0; font-size: 0.9em; font-weight: normal; color: #8ab4f8; text-transform: uppercase; letter-spacing: 1px; }
        #moon-phase-canvas { margin: 0 auto 10px auto; display: block; border-radius: 50%; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        #moon-phase-text { font-weight: bold; font-size: 1.2em; margin-bottom: 5px; }
        #moon-tilt-text { font-size: 0.8em; color: #aaa; }

        #control-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10, 15, 30, 0.8); padding: 15px 25px; border-radius: 30px; color: white; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); pointer-events: auto; }
        .btn-group { display: flex; gap: 10px; }
        button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; transition: all 0.3s; font-size: 0.9em; }
        button:hover { background: rgba(255,255,255,0.25); border-color: white; }
        button.active { background: #4CAF50; border-color: #4CAF50; }
        .slider-container { display: flex; align-items: center; gap: 15px; font-size: 0.9em; }
        input[type=range] { width: 150px; cursor: pointer; }
        #sim-time-display { font-family: monospace; font-size: 1.1em; color: #e8eaed; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="ui-overlay"><div id="status-message">🌍 正在加载高精度模型与着色器...</div></div>
    
    <div id="control-panel">
        <div id="sim-time-display">加载中...</div>
        <div class="slider-container">
            <span>时光机:</span>
            <input type="range" id="time-slider" min="-50" max="50" value="0">
            <span id="speed-display" style="width: 50px; text-align: right;">1x</span>
        </div>
        <div class="btn-group">
            <button id="btn-earth" class="active" onclick="setTarget('earth')">🎯 锁定地球</button>
            <button id="btn-moon" onclick="setTarget('moon')">🎯 追踪月球</button>
            <button onclick="resetTime()">⏱️ 回到此刻</button>
        </div>
    </div>

    <div id="moon-inset-container">
        <h3>实时观测月相</h3>
        <canvas id="moon-phase-canvas" width="80" height="80"></canvas>
        <div id="moon-phase-text">--</div>
        <div id="moon-tilt-text">光照倾角: --°</div>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let earthMesh, cloudsMesh, atmosphereMesh, moonMesh, userMarkerMesh, sunMesh;
        let earthGroup, moonPivot; 
        
        const EARTH_RADIUS = 5; 
        const MOON_RADIUS = EARTH_RADIUS * 0.2724; 
        const MOON_DISTANCE = EARTH_RADIUS * 60.33; 
        const SUN_DISTANCE = 2000; // 太阳的相对位置

        let simTime = Date.now(); 
        let timeMultiplier = 1;   
        const clock = new THREE.Clock();
        let cameraTarget = 'earth'; 

        const statusDiv = document.getElementById('status-message');
        const timeDisplay = document.getElementById('sim-time-display');
        const speedDisplay = document.getElementById('speed-display');
        const timeSlider = document.getElementById('time-slider');
        const btnEarth = document.getElementById('btn-earth');
        const btnMoon = document.getElementById('btn-moon');

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.set(0, 20, 80); 

            // 开启高精度物理渲染
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            // 启用真实的色调映射，让高光不过曝，暗部保留细节
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.minDistance = 6; controls.maxDistance = 3000;

            // --- 全新计算的光影系统 ---
            // 1. 半球光 (HemisphereLight)：上方微微透蓝（模拟宇宙散射），下方深蓝，提亮地球阴影和深海颜色
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x001133, 0.3);
            scene.add(hemiLight);

            // 2. 太阳平行光：极度明亮的主光源
            const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
            sunLight.position.set(SUN_DISTANCE, 0, 0); 
            scene.add(sunLight);

            createSkybox();
            createSun();
            createPlanets();

            window.addEventListener('resize', onWindowResize);

            timeSlider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                timeMultiplier = Math.pow(val, 3); 
                if (val === 0) timeMultiplier = 1; 
                let speedText = timeMultiplier >= 0 ? "+" : "";
                speedText += timeMultiplier > 1000 || timeMultiplier < -1000 ? (timeMultiplier/1000).toFixed(1) + "k" : Math.round(timeMultiplier) + "x";
                speedDisplay.textContent = speedText;
            });
        }

        function createSkybox() {
            const textureLoader = new THREE.TextureLoader();
            const skyGeometry = new THREE.SphereGeometry(4000, 64, 64);
            const skyMaterial = new THREE.MeshBasicMaterial({
                map: textureLoader.load('https://unpkg.com/three-globe/example/img/night-sky.png'),
                side: THREE.BackSide,
                color: 0xaaaaaa // 稍微提亮银河系背景
            });
            scene.add(new THREE.Mesh(skyGeometry, skyMaterial));
        }

        // --- 新增：实体化太阳与光学计算光晕 ---
        function createSun() {
            const loader = new THREE.TextureLoader();
            
            // 太阳本体（一个极亮的纯白/微黄球体）
            const sunGeo = new THREE.SphereGeometry(EARTH_RADIUS * 8, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xfffbea }); // 暖白色
            sunMesh = new THREE.Mesh(sunGeo, sunMat);
            sunMesh.position.set(SUN_DISTANCE, 0, 0);
            scene.add(sunMesh);

            // 太阳光晕 (使用 Sprite 和加色混合计算)
            const glowMat = new THREE.SpriteMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/lensflare/lensflare0.png'),
                color: 0xffffee, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
            });
            const sunGlow = new THREE.Sprite(glowMat);
            sunGlow.scale.set(1000, 1000, 1); // 放大光晕覆盖太阳
            sunMesh.add(sunGlow);
        }

        function createPlanets() {
            const loader = new THREE.TextureLoader();

            earthGroup = new THREE.Group();
            earthGroup.rotation.z = 23.5 * Math.PI / 180;
            scene.add(earthGroup);

            // --- 升级 1：PBR 材质，更清透的海水与陆地 ---
            const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 128, 128);
            const earthMat = new THREE.MeshStandardMaterial({
                map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                bumpMap: loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
                bumpScale: 0.1,
                roughnessMap: loader.load('https://unpkg.com/three-globe/example/img/earth-water.png'),
                roughness: 0.6, // 控制陆地不反光
                metalness: 0.1, // 海水微量金属质感产生耀眼高光
                color: new THREE.Color(0xeeeeff) // 【核心调整】给材质整体叠加淡淡的亮蓝色，让海水更浅更美
            });
            earthMesh = new THREE.Mesh(earthGeo, earthMat);
            earthGroup.add(earthMesh); 

            // --- 升级 2：纯计算的大气层着色器 (GLSL) ---
            // 这里的数学原理是：越靠近球体边缘的位置，法线向量与视线向量越垂直，透明度和蓝色就越强
            const atmosVertexShader = `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;
            const atmosFragmentShader = `
                varying vec3 vNormal;
                void main() {
                    // Fresnel 方程计算边缘发光强度
                    float intensity = pow(0.65 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
                    // 叠加一种空灵的青蓝色 (R, G, B, Alpha)
                    gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                }
            `;
            const atmosGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 64, 64); // 比地球稍微大一点点
            const atmosMat = new THREE.ShaderMaterial({
                vertexShader: atmosVertexShader,
                fragmentShader: atmosFragmentShader,
                blending: THREE.AdditiveBlending, // 加色混合，越叠加越亮
                side: THREE.BackSide,             // 渲染背面产生包围感
                transparent: true
            });
            atmosphereMesh = new THREE.Mesh(atmosGeo, atmosMat);
            earthGroup.add(atmosphereMesh);

            // 云层 (稍微提亮)
            const cloudGeo = new THREE.SphereGeometry(EARTH_RADIUS + 0.035, 64, 64);
            const cloudMat = new THREE.MeshStandardMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false
            });
            cloudsMesh = new THREE.Mesh(cloudGeo, cloudMat);
            earthMesh.add(cloudsMesh); 

            // 月球 (使用物理材质并提亮)
            moonPivot = new THREE.Group();
            moonPivot.rotation.z = 5.14 * Math.PI / 180;
            scene.add(moonPivot);

            const moonGeo = new THREE.SphereGeometry(MOON_RADIUS, 64, 64);
            const moonMat = new THREE.MeshStandardMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg'),
                bumpMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_normal_1024.jpg'),
                bumpScale: 0.05,
                color: new THREE.Color(0xdddddd), // 提亮月球表面
                roughness: 0.9 // 月球表面非常粗糙，漫反射强
            });
            moonMesh = new THREE.Mesh(moonGeo, moonMat);
            moonMesh.position.set(MOON_DISTANCE, 0, 0);
            moonMesh.lookAt(0,0,0);
            moonMesh.rotation.y += Math.PI / 2; 
            moonPivot.add(moonMesh); 
        }

        // 定位代码不变
        function getUserLocation() {
            if (!navigator.geolocation) { statusDiv.innerHTML = "❌ 浏览器不支持定位。"; return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                    statusDiv.innerHTML = `📍 坐标锁定：纬度 ${lat.toFixed(2)}, 经度 ${lon.toFixed(2)}`;
                    const pinGeo = new THREE.CylinderGeometry(0.04, 0.01, 0.8, 16);
                    const pinMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
                    userMarkerMesh = new THREE.Mesh(pinGeo, pinMat);
                    const phi = (90 - lat) * (Math.PI / 180);
                    const theta = (lon + 180) * (Math.PI / 180);
                    const r = EARTH_RADIUS + 0.4;
                    userMarkerMesh.position.set(-(r * Math.sin(phi) * Math.cos(theta)), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
                    userMarkerMesh.lookAt(0,0,0); userMarkerMesh.rotateX(Math.PI / 2); 
                    earthMesh.add(userMarkerMesh); 
                },
                (err) => { statusDiv.innerHTML = "⚠️ 定位失败或被拒绝。"; }
            );
        }

        function resetTime() { simTime = Date.now(); timeSlider.value = 0; timeMultiplier = 1; speedDisplay.textContent = "1x"; }

        function setTarget(target) {
            cameraTarget = target;
            btnEarth.className = target === 'earth' ? 'active' : '';
            btnMoon.className = target === 'moon' ? 'active' : '';
            if(target === 'moon') {
                const moonPos = new THREE.Vector3(); moonMesh.getWorldPosition(moonPos);
                const offset = moonPos.clone().normalize().multiplyScalar(MOON_RADIUS * 15);
                camera.position.copy(moonPos).add(offset);
            } else {
                camera.position.set(0, 20, 80);
            }
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        function updatePhysics() {
            const date = new Date(simTime);
            timeDisplay.textContent = date.toLocaleString('zh-CN', { hour12: false }) + " UTC" + (date.getTimezoneOffset()/-60);

            const hours = date.getUTCHours() + date.getUTCMinutes()/60 + date.getUTCSeconds()/3600;
            earthMesh.rotation.y = Math.PI - ((hours / 24) * Math.PI * 2);
            if(cloudsMesh) cloudsMesh.rotation.y = earthMesh.rotation.y + (simTime * 0.00000001);

            const moonIllum = SunCalc.getMoonIllumination(date);
            moonPivot.rotation.y = moonIllum.phase * Math.PI * 2;

            updateMoonUI(moonIllum);
            
            if (cameraTarget === 'moon') {
                const moonPos = new THREE.Vector3(); moonMesh.getWorldPosition(moonPos);
                controls.target.copy(moonPos);
            } else { controls.target.set(0, 0, 0); }
        }

        function updateMoonUI(moonIllum) {
            const phase = moonIllum.phase; const fraction = moonIllum.fraction; const angle = moonIllum.angle; 
            const pName = ["新月", "蛾眉月", "上弦月", "盈凸月", "满月", "亏凸月", "下弦月", "残月"][Math.floor(phase * 8)] || "新月";
            document.getElementById('moon-phase-text').textContent = `${pName} ${(fraction * 100).toFixed(1)}%`;
            document.getElementById('moon-tilt-text').textContent = `光晕倾角: ${(angle * 180 / Math.PI).toFixed(1)}°`;

            const canvas = document.getElementById('moon-phase-canvas');
            const ctx = canvas.getContext('2d'), r = 40;
            ctx.clearRect(0, 0, 80, 80);
            ctx.save(); ctx.translate(r, r); ctx.rotate(-angle + Math.PI/2); ctx.translate(-r, -r);
            ctx.beginPath(); ctx.arc(r, r, r, 0, Math.PI * 2); ctx.fillStyle = '#1a1a2e'; ctx.fill();

            if (phase > 0 && phase < 1) {
                ctx.fillStyle = '#f5f5f5'; ctx.beginPath();
                ctx.arc(r, r, r, phase <= 0.5 ? -Math.PI/2 : Math.PI/2, phase <= 0.5 ? Math.PI/2 : -Math.PI/2); ctx.fill(); 
                ctx.beginPath(); let scale = Math.abs(Math.cos(phase * Math.PI * 2)); 
                ctx.ellipse(r, r, r * scale, r, 0, 0, Math.PI * 2);
                ctx.fillStyle = (phase < 0.25 || phase > 0.75) ? '#1a1a2e' : '#f5f5f5'; ctx.fill();
            }
            ctx.restore(); 
        }

        function animate() {
            requestAnimationFrame(animate);
            const deltaMs = clock.getDelta() * 1000;
            simTime += deltaMs * timeMultiplier;
            updatePhysics();
            controls.update();
            renderer.render(scene, camera);
        }

        initScene(); getUserLocation(); animate();
    </script>
</body>
</html>
